version: "2.2"
services:
  web:
    build: .
    container_name: dujiaoka
    ports:
      - "80:80"
      - "9000:9000"
    volumes:
      # 增加此行，则将环境信息进行复制到容器，请确保你存在该文件
      - ${DATA_DIR}/dujiaoka/.env:/app/.env
      # 增加此行，避免每次重新创建容器都需要初始化
      - ${DATA_DIR}/dujiaoka/install.lock:/app/install.lock
      # 增加此行，确保将上传的资源映射出来，避免容器重新创建后图片不在了
      - ${DATA_DIR}/dujiaoka/public/uploads:/app/public/uploads
    environment:
      WEB_DOCUMENT_ROOT: "/app/public"
      TZ: Asia/Shanghai
      QUEUE_CONNECTION: "sync"
      DUJIAOKA_ASYNC_SIDE_EFFECTS: "false"
    tty: true
    restart: always

# 本项目默认不依赖常驻 queue worker 或 supervisor。
# 建议使用宿主机 cron 驱动 Laravel scheduler：
# * * * * * docker compose exec -T web php /app/artisan schedule:run >/dev/null 2>&1
#
# 如果你只想单独执行订单过期扫描，也可以改成：
# * * * * * docker compose exec -T web php /app/artisan orders:expire >/dev/null 2>&1
